aid: microsoft-azure-stream-analytics
url: https://raw.githubusercontent.com/api-evangelist/microsoft-azure-stream-analytics/refs/heads/main/apis.yml
name: Azure Stream Analytics
description: >-
  Azure Stream Analytics REST API provides management of real-time analytics
  jobs that process streaming data from IoT devices, Event Hubs, and blob
  storage. It supports creating streaming jobs, defining input sources, output
  destinations, and transformation queries using SQL-like syntax.
